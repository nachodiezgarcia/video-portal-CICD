# Configuracion de nginx para una SPA (Single Page Application)
#
# El punto clave es "try_files $uri $uri/ /index.html":
# cuando el navegador pide una ruta como /courses/123, nginx primero busca
# un archivo fisico con ese nombre y, al no encontrarlo, devuelve index.html.
# Esto permite que TanStack Router gestione la navegacion en el cliente.

server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Compresion gzip para reducir el tamano de la respuesta.
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        text/javascript
        image/svg+xml
        application/xml;

    # Ruta principal: SPA routing.
    # Todas las URLs que no correspondan a un archivo estatico sirven index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache agresiva para assets con hash en el nombre (generados por Vite).
    # Vite pone hashes como "main-BF2a9k3j.js", por lo que es seguro cachearlos
    # de forma indefinida: cuando el contenido cambia, el hash cambia tambien.
    location ~* \.(js|css|woff2?|ttf|eot|ico|png|jpg|jpeg|gif|svg|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
}

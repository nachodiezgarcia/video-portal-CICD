# =============================================================================
# CD: Install → Build → Docker push → Deploy to Render
# =============================================================================
#
# Este workflow se dispara en cada push (merge) a la rama "main" y realiza:
#
#   1. INSTALL:  npm ci  — instala dependencias reproducibles (punto 5)
#   2. BUILD:    vite build  — compila la SPA con las VITE_* vars (punto 5)
#   3. DOCKER:   construye la imagen (solo copia dist/) y la publica en GHCR
#                usando IMAGE_NAME e IMAGE_TAG almacenados como secretos (punto 4)
#   4. DEPLOY:   llama al deploy hook de Render para arrancar el nuevo contenedor
#
# Secretos necesarios en Settings > Secrets > Actions:
#   - VITE_CONTENT_ISLAND_TOKEN  -> token de Content Island (incrustado en build)
#   - VITE_OPENROUTER_API_KEY    -> clave de OpenRouter   (incrustado en build)
#   - IMAGE_NAME                 -> ruta completa de la imagen, ej:
#                                   ghcr.io/nachodiezgarcia/cicd_orquestadores
#   - IMAGE_TAG                  -> tag de la imagen, ej: latest
#   - RENDER_DEPLOY_HOOK_URL     -> URL del deploy hook de Render
#
# El secreto GITHUB_TOKEN lo provee GitHub automaticamente.
# =============================================================================

name: Deploy to Render

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    name: Install, build, push & deploy
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    defaults:
      run:
        working-directory: portal-video-practica

    steps:
      # -----------------------------------------------------------------
      # 1. Clonamos el repositorio
      # -----------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # -----------------------------------------------------------------
      # 2. Configuramos Node.js con cache de npm
      # -----------------------------------------------------------------
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: portal-video-practica/package-lock.json

      # -----------------------------------------------------------------
      # 3. Instalamos dependencias de forma limpia y reproducible
      # -----------------------------------------------------------------
      - name: Install dependencies
        run: npm ci

      # -----------------------------------------------------------------
      # 4. Compilamos la SPA. Las variables VITE_* se inyectan como env
      #    para que Vite las incruste en el bundle JS durante el build.
      #    Tras este step, dist/ queda listo en el workspace.
      # -----------------------------------------------------------------
      - name: Build
        env:
          VITE_CONTENT_ISLAND_TOKEN: ${{ secrets.VITE_CONTENT_ISLAND_TOKEN }}
          VITE_OPENROUTER_API_KEY: ${{ secrets.VITE_OPENROUTER_API_KEY }}
        run: npm run build

      # -----------------------------------------------------------------
      # 5. Autenticamos en GitHub Container Registry
      # username: ${{ github.actor }}
      # -----------------------------------------------------------------
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: prueba-ci-cd
          password: ${{ secrets.GITHUB_TOKEN }}

      # -----------------------------------------------------------------
      # 6. Construimos la imagen Docker (copia dist/ ya generado) y la
      #    publicamos con el nombre e imagen definidos en los secretos
      #    IMAGE_NAME e IMAGE_TAG.
      # -----------------------------------------------------------------
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./portal-video-practica
          file: ./portal-video-practica/Dockerfile
          push: true
          tags: ${{ secrets.IMAGE_NAME }}:${{ secrets.IMAGE_TAG }}

      # -----------------------------------------------------------------
      # 7. Notificamos a Render para que arranque el nuevo contenedor
      # -----------------------------------------------------------------
      - name: Trigger Render deploy
        run: |
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            --fail \
            "${{ secrets.RENDER_DEPLOY_HOOK_URL }}")
          echo "Render deploy hook responded with HTTP $HTTP_STATUS"
